<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView2 Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        button {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

            button:hover {
                transform: scale(1.05);
                transition: 0.2s;
            }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 WebView2 läuft!</h1>
        <p>Deine HTML/CSS/JS-App funktioniert perfekt.</p>
        <button onclick="testClick()">Klick mich!</button>
        <p id="result"></p>
    </div>

    <script>
        function testClick() {
            document.getElementById('result').innerHTML = '✅ JavaScript funktioniert!';
        }
    </script>
</body>
</html>
